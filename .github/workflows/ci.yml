name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python package
        run: python -m pip install -e ".[dev,bench]"

      - name: Install npm dependencies
        run: npm install

      - name: Run pytest
        run: pytest -q

      - name: Run ruff
        run: ruff check .

      - name: Run mypy
        run: mypy src

      - name: Run npm verification
        run: npm test -- --quiet

      - name: Build package
        run: python -m build
